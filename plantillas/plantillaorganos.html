<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Histología - [NOMBRE_ORGANO]</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet"/>

<link rel="stylesheet" href="../../css/estiloGeneral.css"/>
<link rel="stylesheet" href="../../css/estiloVisor.css"/>
<link rel="stylesheet" href="../../css/estiloPanel.css"/>

</head>

<body>

<div id="header-container"></div>

<div class="container-fluid container-pag">

<div class="text-center my-4">
<h2 class="fw-bold text-primary">Tamanduá - [SISTEMA]</h2>
</div>

<div class="row">
<div class="col-lg-12">

<div class="image-container">

<div id="viewer">
<div id="viewer-main"></div>

<!-- PANEL DESCRIPCIÓN -->
<div id="panel-descripcion">

<h3 class="title">[NOMBRE_ORGANO]</h3>

<div class="text-content-area">

<!-- 🔹 4X -->
<div class="pagina active" data-level="4" data-id="[organo]4x">
<p><strong>AUMENTO 4X:</strong></p>
<p>Descripción general del tejido.</p>
</div>

<!-- 🔹 10X -->
<div class="pagina" data-level="10" data-id="[organo]10x">
<p><strong>AUMENTO 10X:</strong></p>
<p>Descripción intermedia.</p>
</div>

<!-- 🔹 40X (usa grupo si quieres misma descripción) -->
<div class="pagina" data-level="40" data-id="[organo]40x1" data-grupo="[organo]40">
<p><strong>AUMENTO 40X:</strong></p>
<p>Descripción detallada.</p>
</div>

<div class="pagina" data-level="40" data-id="[organo]40x2" data-grupo="[organo]40"></div>
<div class="pagina" data-level="40" data-id="[organo]40x3" data-grupo="[organo]40"></div>

</div>
</div>

<!-- TOOLBAR -->
<div id="visor-toolbar" class="visor-toolbar">

<div class="toolbar-left">
<button id="btn-home" class="btn-control"><i class="bi bi-house"></i></button>
<button id="btn-back" class="btn-control"><i class="bi bi-arrow-left"></i></button>
<button id="btn-exit" class="btn-control"><i class="bi bi-x-circle"></i></button>
</div>

<div class="toolbar-center">
<button id="zoom-out" class="btn-control"><i class="bi bi-zoom-out"></i></button>
<button id="zoom-in" class="btn-control"><i class="bi bi-zoom-in"></i></button>
<button id="fit-btn" class="btn-control"><i class="bi bi-aspect-ratio"></i></button>
<button id="fullscreen-btn" class="btn-control"><i class="bi bi-fullscreen"></i></button>
<button id="toggle-labels" class="btn-control"><i class="bi bi-tag"></i></button>
<button id="btn-panel" class="btn-control"><i class="bi bi-layout-sidebar"></i></button>
</div>

</div>

</div>
</div>
</div>
</div>
</div>

<!-- ================= IMÁGENES ================= -->
<div style="display:none;">

<button class="thumb-btn" data-level="4" data-id="[organo]4x" data-src="images/[img4x].jpg" data-inicial="true"></button>

<button class="thumb-btn" data-level="10" data-id="[organo]10x" data-src="images/[img10x].jpg"></button>

<button class="thumb-btn" data-level="40" data-id="[organo]40x1" data-src="images/[img40x1].jpg"></button>

<button class="thumb-btn" data-level="40" data-id="[organo]40x2" data-src="images/[img40x2].jpg"></button>

<button class="thumb-btn" data-level="40" data-id="[organo]40x3" data-src="images/[img40x3].jpg"></button>

</div>

<!-- ================= ETIQUETAS ================= -->
<div id="config-etiquetas" style="display:none;">

<!-- EJEMPLO -->
<div class="etiqueta-link"
data-level="10"
data-id="[organo]10x"
data-x="0.5"
data-y="0.5"
data-label="X">
</div>

</div>

<!-- ================= CUADRANTES ================= -->
<div id="config-cuadrantes" style="display:none;">

<!-- 4X → 10X -->
<div data-parent="4"
data-parent-id="[organo]4x"
data-target="[organo]10x"
data-target-level="10"
data-label="10X"
data-x="0.1" data-y="0.1" data-w="0.3" data-h="0.3">
</div>

<!-- 10X → 40X -->
<div data-parent="10"
data-parent-id="[organo]10x"
data-target="[organo]40x1"
data-target-level="40"
data-label="40X"
data-x="0.2" data-y="0.2" data-w="0.2" data-h="0.2">
</div>

</div>

<div id="footer-container"></div>

<script src="../../js/plantilla.js"></script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/openseadragon/4.1.0/openseadragon.min.js"></script>

<script type="module" src="../../js/main.js"></script>

</body>
</html>
